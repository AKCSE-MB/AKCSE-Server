name: build_and_push

on:
  release:
    types: [published]

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create .npmrc
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_AUTH }}" >> $HOME/.npmrc
          echo "@dev-taeho:registry=https://npm.pkg.github.com" >> $HOME/.npmrc
          echo "npmrc_path=$HOME/.npmrc" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push docker image to Amazon ECR
        env:
          REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          REPOSITORY: akcse-client
          IMAGE_TAG: latest
          NPMRC_PATH: ${{ env.npmrc_path }}
        run: |
          docker buildx build \
            --file ./Dockerfile \
            --tag $REGISTRY/$REPOSITORY:$IMAGE_TAG \
            --cache-from "type=registry,ref=$REGISTRY/$REPOSITORY:$IMAGE_TAG" \
            --secret id=npmrc,src=$NPMRC_PATH \
            --cache-to type=inline \
            --push \
            .
